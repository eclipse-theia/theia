# Local or VPS deployment (Hetzner, Contabo, etc.).
#
#   cp .env.docker.example .env   # set QAAP_OAUTH_PUBLIC_URL + GitHub OAuth callback
#   docker compose up --build -d
#   open http://localhost:4873
#
# Default IDE port is 4873 (not 3000) so Next/Vite dev servers can use :3000 inside the container.
# See packages/qaap-mobile-shell/src/common/qaap-ide-port.ts (QAAP_DOCKER_IDE_PORT).

services:
  theia:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        QAAP_IDE_PORT: ${THEIA_PORT:-4873}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        ANTIGRAVITY_CLI_VERSION: ${ANTIGRAVITY_CLI_VERSION:-latest}
    ports:
      - "${THEIA_PORT:-4873}:${THEIA_PORT:-4873}"
    environment:
      # Theia backend runs in production mode; project bootstrap install uses
      # NODE_ENV=development / npm --include=dev so Vite/Next devDependencies are installed.
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "${THEIA_PORT:-4873}"
      QAAP_GITHUB_CLIENT_ID: ${QAAP_GITHUB_CLIENT_ID:-}
      QAAP_GITHUB_CLIENT_SECRET: ${QAAP_GITHUB_CLIENT_SECRET:-}
      # Public IDE URL, e.g. http://178.105.136.93:4873 (OAuth + dev preview /qaap-dev/<port>/)
      QAAP_OAUTH_PUBLIC_URL: ${QAAP_OAUTH_PUBLIC_URL:-}
      QAAP_SKIP_AUTH: ${QAAP_SKIP_AUTH:-false}
      QAAP_VAPID_PUBLIC_KEY: ${QAAP_VAPID_PUBLIC_KEY:-}
      QAAP_VAPID_PRIVATE_KEY: ${QAAP_VAPID_PRIVATE_KEY:-}
      QAAP_VAPID_SUBJECT: ${QAAP_VAPID_SUBJECT:-mailto:qaap@localhost}
      # Background-agent CLI template for Jobs tasks ({prompt} = task description).
      QAAP_AGENT_COMMAND: ${QAAP_AGENT_COMMAND:-}
      QAAP_AGENT_COMMANDS: ${QAAP_AGENT_COMMANDS:-}
      QAAP_DEFAULT_AGENT: ${QAAP_DEFAULT_AGENT:-qaiq}
      QAAP_CLOUD_MODE: ${QAAP_CLOUD_MODE:-local}
      # BYOK / free-tier keys for @qaiq background jobs (also set in Settings → AI).
      # Explicit env vars here override empty preferences; see doc/qaap-vps-deployment.md.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      # Optional: mount a host folder as the default workspace
      # THEIA_PLUGINS_DIR: /app/plugins
    volumes:
      - theia-workspace:/workspace
      # Persist GitHub OAuth, agent-task index, qaap-task helper token.
      - qaap-auth-data:/root/.qaap
      # Persist Settings → AI keys and user preferences across rebuilds.
      - qaap-theia-user:/root/.theia
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  theia-workspace:
  qaap-auth-data:
  qaap-theia-user:
